<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お問い合わせありがとうございます｜TOKOWAKA 吉祥寺</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Noto+Sans+JP:wght@300;400;500;600&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1b2a47;--navy-d:#101b2e;--gold:#b8965a;--gold-l:#cda86c;--cream:#f7f3ec;--ink:#2a2f38;--soft:#6b7280;--bd:#e5e0d6;--white:#fff;--r:2px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--white);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;line-height:1.85}
header{padding:20px 40px;border-bottom:1px solid var(--bd)}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--navy);text-decoration:none;letter-spacing:.16em;font-weight:500;display:inline-block}
.h-logo small{font-family:'Noto Sans JP',sans-serif;font-size:8px;font-weight:400;letter-spacing:.26em;color:var(--gold);display:block;margin-top:4px;text-transform:uppercase}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:64px 24px}
.ty-box{max-width:540px}
.ty-icon{width:66px;height:66px;margin:0 auto 30px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center}
.ty-icon svg{width:30px;height:30px;stroke:var(--gold);fill:none;stroke-width:1.6}
.ty-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:.2em;color:var(--gold);display:block;margin-bottom:16px}
.ty-h{font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(22px,4vw,30px);color:var(--navy);line-height:1.6;margin-bottom:22px;letter-spacing:.04em}
.ty-p{font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--soft);line-height:2.05;margin-bottom:38px}
.ty-btn{display:inline-block;background:linear-gradient(120deg,var(--gold),var(--gold-l));color:#fff;font-weight:600;font-size:14px;letter-spacing:.05em;padding:15px 42px;border-radius:var(--r);text-decoration:none;box-shadow:0 6px 20px rgba(184,150,90,.28)}
footer{background:var(--navy-d);padding:26px 40px;text-align:center}
.f-logo{font-family:'Cormorant Garamond',serif;font-size:21px;color:rgba(255,255,255,.88);letter-spacing:.16em}
.f-copy{font-family:'Noto Sans JP',sans-serif;font-size:9px;letter-spacing:.06em;color:rgba(255,255,255,.42);margin-top:10px}
@media(max-width:580px){header{padding:18px 22px}main{padding:48px 22px}}
</style>
</head>
<body>
<header><a href="/" class="h-logo">TOKOWAKA<small>Personal Gym · Kichijoji</small></a></header>
<main>
  <div class="ty-box">
    <div class="ty-icon"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
    <span class="ty-en">Thank You</span>
    <h1 class="ty-h">お問い合わせ<br>ありがとうございます。</h1>
    <p class="ty-p">内容を確認のうえ、担当者より2営業日以内にご連絡いたします。<br>お急ぎの場合は、お電話（070-3549-8168）でもお気軽にどうぞ。</p>
    <a href="/" class="ty-btn">トップページへ戻る</a>
  </div>
</main>
<footer>
  <p class="f-logo">TOKOWAKA</p>
  <p class="f-copy">© 2026 TOKOWAKA 吉祥寺. All rights reserved.</p>
</footer>
</body>
</html>
